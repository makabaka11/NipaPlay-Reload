name: PR Validation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Analyze and Test
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup Flutter Environment
        uses: ./.github/actions/setup-flutter

      - name: Generate build info json
        run: python3 .github/workflows/scripts/generate-build-info-json.py assets/build_info.json

      - name: Run flutter analyze
        run: flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings lib

      # Tests are temporarily disabled so this workflow stays focused on a
      # single analysis pass for the main app code.
